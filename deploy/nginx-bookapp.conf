##============================================================
##  家庭记账本 - Nginx 配置
##  使用方法:
##    1. 复制到 /etc/nginx/conf.d/bookapp.conf
##    2. 修改 server_name 为实际域名或 IP
##    3. 修改 root 路径为前端静态文件目录
##    4. 执行 nginx -t && nginx -s reload
##============================================================

server {
    listen       80;
    server_name  _;   # 改为实际域名或服务器 IP

    # 前端静态文件
    root /opt/book-app/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # 静态资源缓存（排除 /api/ 路径，避免拦截后端资源请求）
    location ~* ^(?!/api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传大小限制（与后端配置一致）
        client_max_body_size 20m;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # H2 控制台（可选，生产环境建议注释掉）
    location /h2-console/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE 事件流（视频特效彩蛋）
    location /api/video-effect/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Vue Router history 模式 — 所有未匹配的请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 访问日志
    access_log /var/log/nginx/bookapp_access.log;
    error_log  /var/log/nginx/bookapp_error.log;
}
