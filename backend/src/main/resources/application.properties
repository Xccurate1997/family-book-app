spring.application.name=book-app-backend
server.port=8080

# H2 file-based persistence, stored in user home
spring.datasource.url=jdbc:h2:file:${user.home}/.bookapp/data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Serialize Java time as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# H2 console for debugging (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
